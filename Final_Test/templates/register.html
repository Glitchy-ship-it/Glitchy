<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #1a1a1a;
            width: 380px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.15);
            border: 1px solid #2d2d2d;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #00ffaa;
        }

        label {
            font-size: 14px;
            color: #cccccc;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 7px;
            margin-bottom: 18px;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: 2px solid #00ffaa;
            background: #333333;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .register-btn {
            background: #00ffaa;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
        }

        .register-btn:hover {
            background: #00cc88;
        }

        .reset-btn {
            background: #333333;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #444444;
        }

        .small-text {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #888888;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>User Registration</h2>

        <form action="/submit" method="post">
            <label>Name:</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Age:</label>
            <input type="number" name="age" placeholder="Enter your age" required>

            <div class="button-group">
                <input class="register-btn" type="submit" value="Register">
                <input class="reset-btn" type="reset" value="Clear">
            </div>
        </form>

        <p class="small-text">Secure registration form</p>
    </div>
</body>
</html>
