<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #1a1a1a;
            width: 400px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.15);
            border: 1px solid #2d2d2d;
            text-align: center;
        }

        h2 {
            color: #00ffaa;
            margin-bottom: 20px;
        }

        .info-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            text-align: left;
        }

        .label {
            color: #888888;
            font-size: 13px;
        }

        .value {
            color: white;
            font-size: 16px;
            margin-top: 5px;
        }

        a {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 20px;
            background: #00ffaa;
            color: #000000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background: #00cc88;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Registration Successful</h2>

        <div class="info-box">
            <div class="label">Name</div>
            <div class="value">{{ name }}</div>
        </div>

        <div class="info-box">
            <div class="label">Email</div>
            <div class="value">{{ email }}</div>
        </div>

        <div class="info-box">
            <div class="label">Age</div>
            <div class="value">{{ age }}</div>
        </div>

        <a href="/">Go Back</a>
    </div>
</body>
</html>
